<!DOCTYPE html>

<html>


<head>
    <title>Revision Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id = "stats-box">
        <p id = "total-topics" > Total Topics:</p>
        <p id = "done-today"> Done Today:</p>
        <p id = "needRev"> Need Revision:</p>
        <p id = "streak"> Streak:</p>
    </div>

    <div class = "container">

        <p id="result">
            Today's revision topic is:
        </p>
        <button class="shuffle-btn">Shuffle</button>

        <button class="done-btn">Done Revising</button>

        <input type = "text" placeholder ="Enter New Topic">
        <button class="new-btn">Add</button>
        

    </div>

    <img src="media/sky.jpeg" id="sky-image">


    <script src="script.js"></script>
</body>



</html>
